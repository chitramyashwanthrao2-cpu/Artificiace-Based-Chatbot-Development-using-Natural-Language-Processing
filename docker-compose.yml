version: "3.8"

services:
  nlp-chatbot:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - DB_PATH=/app/data/conversations.db
    restart: unless-stopped

  # Optional: Redis for caching/session
  redis:
    image: redis:alpine
    restart: unless-stopped
